# Cargo configuration for evm-cli.
#
# This file declares per-target linkers so `cargo build --target <triple>`
# (used in cross-compile + by .github/workflows/release.yml) uses the
# correct cross toolchain instead of falling back to the host `cc`.
#
# Without these, `aarch64-unknown-linux-gnu` cross-builds silently use
# the host x86_64 gcc, which links with the x86_64 sysroot and
# produces the error: object files are "incompatible with elf64-x86-64"
# at the rust-lld stage.
#
# See ADR-style rationale in commit 2d7f7d1 (the original musl→gnu
# fix) and the follow-up commit (this file).
#
# Applies to:
#   - .github/workflows/release.yml (CI release pipeline)
#   - Local cross-build: `cargo build --target aarch64-unknown-linux-gnu`
#   - scripts/build_release_artifact.sh (mirrors CI steps)

[target.aarch64-unknown-linux-gnu]
# Provided by apt: `gcc-aarch64-linux-gnu` (already installed in the
# CI step "Install cross-compile target + linker"). Local users
# running the same apt package don't need any extra setup.
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
# Symmetric native-target entry. `gcc` is the system compiler on
# ubuntu-latest CI runners; declaring it explicitly shields future
# contributors who have a different default `cc` (e.g. clang via
# update-alternatives on Arch / Fedora).
linker = "gcc"
