# deny.toml — cargo-deny configuration per PLAN-V9 §5 M0 DoD
# Bans: GPL-licensed deps, wildcard versions, unmaintained crates.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Per PLAN-V9 §5 M0 DoD: "deny.toml forbids GPL, wildcard versions,
# unmaintained crates." The `unmaintained = "deny"` line below makes
# the RUSTSEC `unmaintained` advisory category block the build.
unmaintained = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"  # forbid "1.*" style version specs
highlight = "all"
allow = []
deny = []

# Note: PLAN-V9 §7 "Dependencies" also requires RUSTSEC unmaintained
# advisories to fail the build. Enforced via the [advisories] section
# above (unmaintained = "deny").

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
