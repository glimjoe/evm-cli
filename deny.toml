# deny.toml — cargo-deny configuration per V8 §5 M0 DoD
# Bans: GPL-licensed deps, wildcard versions, unmaintained crates.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",  # transitively via reqwest/rustls; review if changed
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"  # forbid "1.*" style version specs
highlight = "all"
allow = []
deny = []

# Block crates that have been deprecated or whose maintainers have
# explicitly handed off. This list is checked against RUSTSEC advisories.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
